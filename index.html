<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números Primos</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts para una mejor tipografía (Cambiado a fuente tipo terminal) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #000;
            /* Fondo negro para la Matrix */
            color: #22c55e;
        }

        /* Ocultar las flechas del input number para un aspecto más limpio */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- Canvas para el fondo Matrix -->
    <canvas id="matrixCanvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- Contenedor principal (Tarjeta) -->
    <div
        class="bg-black/80 backdrop-blur-md rounded-2xl border border-green-500/30 shadow-[0_0_20px_rgba(34,197,94,0.3)] w-full max-w-md p-6 sm:p-8 transform transition-all hover:shadow-[0_0_30px_rgba(34,197,94,0.5)]">

        <!-- Encabezado -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-900/50 border border-green-500/50 text-green-400 mb-4 shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-green-400 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]">Números Primos</h1>
            <p class="text-green-600/80 mt-2 text-sm">Ingresa un número entero para verificar si es divisible únicamente
                por 1 y por sí mismo.</p>
        </div>

        <!-- Formulario / Input -->
        <div class="space-y-4">
            <div>
                <label for="numberInput" class="block text-sm font-medium text-green-500 mb-1">Número a
                    verificar</label>
                <input type="number" id="numberInput" placeholder="Ej. 7, 13, 100"
                    class="w-full px-4 py-3 bg-black/50 border border-green-500/50 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-colors text-lg text-green-400 placeholder-green-800/50 shadow-[inset_0_0_10px_rgba(34,197,94,0.1)]"
                    onkeypress="handleKeyPress(event)">
            </div>

            <button onclick="checkPrime()"
                class="w-full bg-green-900/40 hover:bg-green-500 border border-green-500/80 text-green-400 hover:text-black font-semibold py-3 px-4 rounded-xl transition-all duration-300 shadow-[0_0_10px_rgba(34,197,94,0.2)] hover:shadow-[0_0_20px_rgba(34,197,94,0.6)] active:transform active:scale-95 flex justify-center items-center gap-2">
                Verificar Número
            </button>
        </div>

        <!-- Área de resultados -->
        <div id="resultArea" class="mt-6 hidden">
            <div id="resultBox" class="rounded-xl p-4 text-center border">
                <p id="resultIcon" class="text-4xl mb-2 drop-shadow-md"></p>
                <h3 id="resultTitle" class="text-lg font-bold"></h3>
                <p id="resultMessage" class="text-sm mt-1"></p>
            </div>
        </div>

    </div>

    <!-- Créditos en la parte inferior izquierda -->
    <div
        class="fixed bottom-4 left-4 text-green-500/80 text-xs font-mono z-10 pointer-events-none drop-shadow-md bg-black/50 p-2 rounded-lg backdrop-blur-sm">
        Elaborado por Nicolás Fresneda con asistencia de inteligencia artificial
    </div>

    <!-- Lógica de la aplicación en JavaScript -->
    <script>
        // --- Configuración del fondo Matrix ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let columns, drops;
        const fontSize = 16;
        // Caracteres binarios (0 y 1)
        const characters = '01';

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }
        }

        function drawMatrix() {
            // Fondo semi-transparente para el efecto de estela
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#22c55e'; // Verde característico
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Seleccionar un caracter aleatorio
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                // Dibujarlo
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Enviar la gota de vuelta arriba aleatoriamente tras cruzar la pantalla
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        // Iniciar la animación y escuchar cambios de tamaño de pantalla
        window.addEventListener('resize', initMatrix);
        initMatrix();
        setInterval(drawMatrix, 35);

        // Función matemática para verificar si es primo
        function isPrime(num) {
            // Los números menores o iguales a 1 no son primos
            if (num <= 1) return false;
            // 2 y 3 son primos
            if (num <= 3) return true;

            // Eliminar múltiplos de 2 y 3 rápidamente
            if (num % 2 === 0 || num % 3 === 0) return false;

            // Verificar divisores desde 5 en adelante (optimización 6k ± 1)
            for (let i = 5; i * i <= num; i += 6) {
                if (num % i === 0 || num % (i + 2) === 0) return false;
            }

            return true;
        }

        // Función para encontrar el primer divisor (para dar mejor feedback)
        function getFirstDivisor(num) {
            if (num % 2 === 0) return 2;
            if (num % 3 === 0) return 3;
            for (let i = 5; i * i <= num; i += 6) {
                if (num % i === 0) return i;
                if (num % (i + 2) === 0) return i + 2;
            }
            return num;
        }

        // Permitir usar la tecla "Enter" para verificar
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPrime();
            }
        }

        // Función principal que se ejecuta al presionar el botón
        function checkPrime() {
            const inputElement = document.getElementById('numberInput');
            const resultArea = document.getElementById('resultArea');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');

            const inputValue = inputElement.value;

            // Validar si el campo está vacío
            if (inputValue.trim() === '') {
                showResult(false, "⚠️", "Entrada inválida", "Por favor, ingresa un número.", "bg-yellow-900/20", "border-yellow-500/50", "text-yellow-400", "text-yellow-500/80");
                return;
            }

            const num = Number(inputValue);

            // Validar si es un número entero
            if (!Number.isInteger(num)) {
                showResult(false, "⚠️", "Número decimal", "Por favor, ingresa un número entero sin decimales.", "bg-yellow-900/20", "border-yellow-500/50", "text-yellow-400", "text-yellow-500/80");
                return;
            }

            // Lógica para números menores o iguales a 1
            if (num <= 1) {
                let reason = num === 1 ? "El número 1 no se considera ni primo ni compuesto por convención matemática." : "Los números primos deben ser enteros mayores que 1.";
                showResult(false, "❌", `El ${num} no es primo`, reason, "bg-red-900/20", "border-red-500/50", "text-red-400", "text-red-500/80");
                return;
            }

            // Lógica principal
            if (isPrime(num)) {
                showResult(true, "✨", `¡El ${num} es Primo!`, "Solo es divisible por 1 y por sí mismo.", "bg-green-900/20", "border-green-500/80", "text-green-400", "text-green-500/80");
            } else {
                const divisor = getFirstDivisor(num);
                const complement = num / divisor;
                showResult(false, "❌", `El ${num} no es primo`, `Es divisible por ${divisor} ( ${divisor} × ${complement} = ${num} ).`, "bg-red-900/20", "border-red-500/50", "text-red-400", "text-red-500/80");
            }
        }

        // Función auxiliar para actualizar la UI del resultado
        function showResult(isValid, icon, title, message, bgColor, borderColor, titleColor, textColor) {
            const resultArea = document.getElementById('resultArea');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');

            // Resetear clases
            resultBox.className = `rounded-xl p-5 text-center border ${bgColor} ${borderColor} transition-all duration-300`;
            resultTitle.className = `text-lg font-bold ${titleColor}`;
            resultMessage.className = `text-sm mt-1 ${textColor}`;

            // Actualizar contenido
            resultIcon.textContent = icon;
            resultTitle.textContent = title;
            resultMessage.textContent = message;

            // Mostrar el área con una pequeña animación
            resultArea.classList.remove('hidden');
            resultArea.classList.add('animate-fade-in-up');
        }
    </script>
    <style>
        /* Animación personalizada para el resultado */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</body>

</html>
